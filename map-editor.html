<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Map Pin Editor — Knowledge Garden</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #topbar h1 { font-size: 0.95rem; font-weight: 700; color: #e94560; margin-right: auto; }
    #topbar label { font-size: 0.75rem; color: #aaa; white-space: nowrap; }
    #topbar input[type="text"] {
      background: #0f3460; border: 1px solid #e94560; color: #fff;
      padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; width: 220px;
    }
    button {
      background: #e94560; color: #fff; border: none;
      padding: 5px 12px; border-radius: 4px; cursor: pointer;
      font-size: 0.78rem; font-weight: 600; transition: background 0.15s; white-space: nowrap;
    }
    button:hover { background: #c73652; }
    button.sec { background: #0f3460; border: 1px solid #555; }
    button.sec:hover { background: #1a4a80; }
    button.ghost { background: transparent; border: 1px solid #444; color: #aaa; }
    button.ghost:hover { border-color: #e94560; color: #e94560; }
    button.danger { background: #5c1a1a; border: 1px solid #e94560; color: #ff8888; }
    button.danger:hover { background: #8b2222; }

    /* ── Layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Map ── */
    #map-wrap {
      flex: 1; position: relative; overflow: hidden;
      background: #0d0d1a; cursor: crosshair;
    }
    #map-img {
      display: block; width: 100%; height: 100%;
      object-fit: contain; object-position: top left;
      user-select: none; pointer-events: none;
    }
    #map-placeholder {
      position: absolute; inset: 0; display: flex;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: #444; font-size: 0.85rem; pointer-events: none;
    }
    #map-placeholder span { font-size: 3rem; }

    /* ── Pins ── */
    .pin {
      position: absolute;
      width: 26px; height: 26px;
      border-radius: 50% 50% 50% 0;
      transform: translate(-50%, -100%) rotate(-45deg);
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.5);
      transition: transform 0.1s;
    }
    .pin:hover { transform: translate(-50%, -100%) rotate(-45deg) scale(1.2); }
    .pin.selected { border-color: #fff; box-shadow: 0 0 0 3px rgba(233,69,96,0.8); }
    .pin-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transform: rotate(45deg); font-size: 0.6rem; font-weight: 700;
      color: #fff; pointer-events: none;
    }
    .pin-label {
      position: absolute;
      transform: translate(-50%, calc(-100% - 30px));
      background: rgba(0,0,0,0.7); color: #fff;
      font-size: 0.62rem; padding: 2px 5px; border-radius: 3px;
      white-space: nowrap; pointer-events: none;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 300px; background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sb-head {
      padding: 10px 14px; background: #0f3460;
      font-size: 0.8rem; font-weight: 700; color: #e94560; flex-shrink: 0;
    }

    /* Location form */
    #loc-form {
      padding: 12px 14px; border-bottom: 1px solid #0f3460;
      display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
    }
    #loc-form.disabled { opacity: 0.35; pointer-events: none; }
    .field label { font-size: 0.7rem; color: #999; display: block; margin-bottom: 3px; }
    .field input, .field select {
      width: 100%; background: #0d0d1a; border: 1px solid #333;
      color: #e0e0e0; padding: 5px 8px; border-radius: 4px; font-size: 0.78rem;
    }
    .field input:focus, .field select:focus { outline: none; border-color: #e94560; }

    /* Rooms list inside form */
    #rooms-list { display: flex; flex-direction: column; gap: 6px; }
    .room-row {
      background: #0d0d1a; border: 1px solid #222;
      border-radius: 5px; padding: 7px 8px;
      display: flex; flex-direction: column; gap: 5px;
    }
    .room-row .rr-top { display: flex; gap: 6px; align-items: center; }
    .room-row input { flex: 1; background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; padding: 4px 6px; border-radius: 3px; font-size: 0.75rem; }
    .room-row select { width: 100%; background: #1a1a2e; border: 1px solid #333; color: #e0e0e0; padding: 4px 6px; border-radius: 3px; font-size: 0.72rem; }
    .room-row input:focus, .room-row select:focus { outline: none; border-color: #e94560; }
    .room-del { background: transparent; border: none; color: #666; cursor: pointer; font-size: 0.9rem; padding: 0 2px; flex-shrink: 0; }
    .room-del:hover { color: #e94560; }

    #add-room-btn { align-self: flex-start; }

    .loc-actions { display: flex; gap: 6px; }
    .loc-actions button { flex: 1; }

    /* Hint */
    #hint { padding: 10px 14px; font-size: 0.72rem; color: #555; flex-shrink: 0; }

    /* Location list */
    #loc-list-wrap { flex: 1; overflow-y: auto; padding: 6px 0; }
    .loc-item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 14px; cursor: pointer;
      border-left: 3px solid transparent; transition: background 0.1s;
    }
    .loc-item:hover { background: #0f3460; }
    .loc-item.active { background: #0f3460; border-left-color: #e94560; }
    .loc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .loc-info { flex: 1; min-width: 0; }
    .loc-name { font-size: 0.78rem; font-weight: 600; }
    .loc-rooms { font-size: 0.66rem; color: #777; }

    /* Export */
    #export-bar {
      padding: 10px 14px; border-top: 1px solid #0f3460;
      display: flex; flex-direction: column; gap: 6px; flex-shrink: 0;
    }
    #export-bar .row { display: flex; gap: 6px; }
    #export-bar .row button { flex: 1; }
    #export-status { font-size: 0.7rem; color: #4caf50; min-height: 1em; text-align: center; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>🗺 Map Pin Editor</h1>
  <label>Kartenbild:</label>
  <input type="text" id="img-input" value="map.png" placeholder="map.png" />
  <button onclick="loadImage()">Laden</button>
  <button class="sec" onclick="loadJson()">JSON laden</button>
</div>

<div id="main">

  <div id="map-wrap">
    <img id="map-img" src="" alt="" style="display:none;" />
    <div id="map-placeholder">
      <span>🗺</span>
      <p>Kartenbild laden, dann auf die Karte klicken um Pins zu setzen</p>
    </div>
  </div>

  <div id="sidebar">
    <div class="sb-head">Locations</div>

    <!-- Selected location form -->
    <div id="loc-form" class="disabled">

      <div class="field">
        <label>Ortsname</label>
        <input type="text" id="f-name" placeholder="z.B. Dein Haus" oninput="updateLocName()" />
      </div>

      <div class="field">
        <label>Räume in diesem Ort</label>
        <div id="rooms-list"></div>
      </div>

      <button class="ghost" id="add-room-btn" onclick="addRoom()">+ Raum hinzufügen</button>

      <div class="loc-actions">
        <button class="danger" onclick="deleteSelected()">🗑 Ort löschen</button>
      </div>
    </div>

    <div id="hint">Klick auf die Karte = neuer Ort</div>

    <div id="loc-list-wrap">
      <div id="loc-list"></div>
    </div>

    <div id="export-bar">
      <div class="row">
        <button onclick="copyJson()">📋 JSON kopieren</button>
        <button class="sec" onclick="downloadJson()">💾 Download</button>
      </div>
      <div id="export-status"></div>
    </div>
  </div>

</div>

<script>

// ── Beds (hardcoded — add more as chapters grow) ───────────
// Update this list whenever you add new beds to content.js
const BEDS = [
  { id: "zytologie_1031",    title: "Zytologie (1031)" },
  { id: "histologie_1032",   title: "Histologie (1032)" },
  { id: "knochenlehre_1033", title: "Knochenlehre (1033)" },
  { id: "muskellehre_1034",  title: "Muskellehre (1034)" },
  { id: "atmungssystem_1035",title: "Atmungssystem (1035)" },
];

function bedTitle(bedId) {
  const b = BEDS.find(b => b.id === bedId);
  return b ? b.title : (bedId || "—");
}

function bedDropdownOptions(selectedId = "") {
  const none = `<option value="">— kein Kapitel —</option>`;
  return none + BEDS.map(b =>
    `<option value="${b.id}" ${b.id === selectedId ? "selected" : ""}>${b.title}</option>`
  ).join("");
}

// ── State ──────────────────────────────────────────────────
let locations = [];   // { id, name, x, y, rooms: [{ name, bedId }] }
let selectedId = null;
let nextId = 1;
let mapSrc = "map.png";

const COLORS = ["#e94560","#f4a261","#2ec4b6","#a8dadc","#c77dff","#06d6a0","#ffd166","#ef476f","#118ab2","#83c5be","#e76f51","#457b9d"];

// ── Map ────────────────────────────────────────────────────
function loadImage() {
  mapSrc = document.getElementById("img-input").value.trim() || "map.png";
  const img = document.getElementById("map-img");
  img.src = mapSrc;
  img.style.display = "block";
  document.getElementById("map-placeholder").style.display = "none";
}

document.getElementById("map-wrap").addEventListener("click", function(e) {
  if (e.target.closest(".pin")) return;
  const r = this.getBoundingClientRect();
  const x = +((e.clientX - r.left) / r.width  * 100).toFixed(2);
  const y = +((e.clientY - r.top)  / r.height * 100).toFixed(2);
  const loc = { id: nextId++, name: `Ort ${locations.length + 1}`, x, y, rooms: [{ name: "", bedId: "" }] };
  locations.push(loc);
  renderAll();
  selectLoc(loc.id);
});

// ── Selection ──────────────────────────────────────────────
function selectLoc(id) {
  selectedId = id;
  renderAll();
  const loc = locations.find(l => l.id === id);
  const form = document.getElementById("loc-form");
  if (!loc) { form.classList.add("disabled"); return; }
  form.classList.remove("disabled");
  document.getElementById("f-name").value = loc.name;
  renderRoomsList(loc);
  const li = document.querySelector(`.loc-item[data-id="${id}"]`);
  if (li) li.scrollIntoView({ block: "nearest" });
}

// ── Location name ──────────────────────────────────────────
function updateLocName() {
  const loc = locations.find(l => l.id === selectedId);
  if (!loc) return;
  loc.name = document.getElementById("f-name").value;
  // re-render list item only (avoid full re-render which resets cursor)
  const li = document.querySelector(`.loc-item[data-id="${selectedId}"] .loc-name`);
  if (li) li.textContent = `${locations.indexOf(loc)+1}. ${loc.name}`;
  const label = document.querySelector(`.pin-label[data-id="${selectedId}"]`);
  if (label) label.textContent = loc.name;
}

// ── Rooms ──────────────────────────────────────────────────
function renderRoomsList(loc) {
  const container = document.getElementById("rooms-list");
  container.innerHTML = "";
  loc.rooms.forEach((room, i) => {
    const row = document.createElement("div");
    row.className = "room-row";
    row.innerHTML = `
      <div class="rr-top">
        <input type="text" placeholder="Raumname z.B. Küche" value="${room.name}"
          oninput="updateRoom(${i}, 'name', this.value)" />
        <button class="room-del" onclick="removeRoom(${i})" title="Raum entfernen">✕</button>
      </div>
      <select onchange="updateRoom(${i}, 'bedId', this.value)">
        ${bedDropdownOptions(room.bedId)}
      </select>
    `;
    container.appendChild(row);
  });
}

function addRoom() {
  const loc = locations.find(l => l.id === selectedId);
  if (!loc) return;
  loc.rooms.push({ name: "", bedId: "" });
  renderRoomsList(loc);
  renderLocList();
}

function removeRoom(i) {
  const loc = locations.find(l => l.id === selectedId);
  if (!loc || loc.rooms.length <= 1) return;
  loc.rooms.splice(i, 1);
  renderRoomsList(loc);
  renderLocList();
}

function updateRoom(i, field, value) {
  const loc = locations.find(l => l.id === selectedId);
  if (!loc || !loc.rooms[i]) return;
  loc.rooms[i][field] = value;
  // update subtitle in list
  const li = document.querySelector(`.loc-item[data-id="${selectedId}"] .loc-rooms`);
  if (li) li.textContent = roomsSummary(loc);
}

function roomsSummary(loc) {
  const named = loc.rooms.filter(r => r.name).map(r => r.name);
  if (!named.length) return "Keine Räume";
  return named.join(", ");
}

// ── Delete location ────────────────────────────────────────
function deleteSelected() {
  locations = locations.filter(l => l.id !== selectedId);
  selectedId = null;
  document.getElementById("loc-form").classList.add("disabled");
  renderAll();
}

// ── Render ─────────────────────────────────────────────────
function renderAll() {
  renderMapPins();
  renderLocList();
}

function renderMapPins() {
  document.querySelectorAll(".pin, .pin-label").forEach(el => el.remove());
  const wrap = document.getElementById("map-wrap");
  locations.forEach((loc, i) => {
    const color = COLORS[i % COLORS.length];

    const label = document.createElement("div");
    label.className = "pin-label";
    label.dataset.id = loc.id;
    label.textContent = loc.name;
    label.style.left = `${loc.x}%`;
    label.style.top  = `${loc.y}%`;

    const el = document.createElement("div");
    el.className = "pin" + (loc.id === selectedId ? " selected" : "");
    el.dataset.id = loc.id;
    el.style.left = `${loc.x}%`;
    el.style.top  = `${loc.y}%`;
    el.style.background = color;
    el.innerHTML = `<div class="pin-num">${i+1}</div>`;

    el.addEventListener("click", e => { e.stopPropagation(); selectLoc(loc.id); });
    el.addEventListener("mousedown", startDrag);

    wrap.appendChild(label);
    wrap.appendChild(el);
  });
}

function renderLocList() {
  const list = document.getElementById("loc-list");
  list.innerHTML = "";
  if (!locations.length) {
    list.innerHTML = `<div style="padding:14px;font-size:0.72rem;color:#444;">Noch keine Orte gesetzt.</div>`;
    return;
  }
  locations.forEach((loc, i) => {
    const color = COLORS[i % COLORS.length];
    const item = document.createElement("div");
    item.className = "loc-item" + (loc.id === selectedId ? " active" : "");
    item.dataset.id = loc.id;
    item.innerHTML = `
      <div class="loc-dot" style="background:${color}"></div>
      <div class="loc-info">
        <div class="loc-name">${i+1}. ${loc.name}</div>
        <div class="loc-rooms">${roomsSummary(loc)}</div>
      </div>
    `;
    item.addEventListener("click", () => selectLoc(loc.id));
    list.appendChild(item);
  });
}

// ── Drag ───────────────────────────────────────────────────
let dragging = null;
function startDrag(e) {
  e.preventDefault(); e.stopPropagation();
  dragging = +e.currentTarget.dataset.id;
  selectLoc(dragging);
  const wrap = document.getElementById("map-wrap");
  function onMove(e) {
    const r = wrap.getBoundingClientRect();
    const x = +Math.max(0, Math.min(100, (e.clientX - r.left) / r.width  * 100)).toFixed(2);
    const y = +Math.max(0, Math.min(100, (e.clientY - r.top)  / r.height * 100)).toFixed(2);
    const loc = locations.find(l => l.id === dragging);
    if (!loc) return;
    loc.x = x; loc.y = y;
    const pin = document.querySelector(`.pin[data-id="${dragging}"]`);
    const lbl = document.querySelector(`.pin-label[data-id="${dragging}"]`);
    if (pin) { pin.style.left = `${x}%`; pin.style.top = `${y}%`; }
    if (lbl) { lbl.style.left = `${x}%`; lbl.style.top  = `${y}%`; }
  }
  function onUp() {
    dragging = null;
    document.removeEventListener("mousemove", onMove);
    document.removeEventListener("mouseup", onUp);
  }
  document.addEventListener("mousemove", onMove);
  document.addEventListener("mouseup", onUp);
}

// ── JSON ───────────────────────────────────────────────────
function buildJson() {
  return JSON.stringify({
    mapImage: mapSrc,
    locations: locations.map(({ name, x, y, rooms }) => ({ name, x, y, rooms }))
  }, null, 2);
}

function copyJson() {
  navigator.clipboard.writeText(buildJson()).then(() => showStatus("✓ Kopiert"));
}

function downloadJson() {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([buildJson()], { type: "application/json" }));
  a.download = "map-config.json";
  a.click();
  showStatus("✓ map-config.json gespeichert");
}

function loadJson() {
  const input = document.createElement("input");
  input.type = "file"; input.accept = ".json";
  input.onchange = e => {
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.mapImage) { mapSrc = data.mapImage; document.getElementById("img-input").value = mapSrc; loadImage(); }
        locations = []; nextId = 1;
        (data.locations || []).forEach(l => {
          locations.push({ id: nextId++, name: l.name || "", x: l.x, y: l.y, rooms: l.rooms || [{ name: "", bedId: "" }] });
        });
        renderAll();
        showStatus("✓ Geladen");
      } catch(err) { alert("Fehler: " + err.message); }
    };
    reader.readAsText(e.target.files[0]);
  };
  input.click();
}

function showStatus(msg) {
  const el = document.getElementById("export-status");
  el.textContent = msg;
  setTimeout(() => el.textContent = "", 3000);
}

// ── Init ───────────────────────────────────────────────────
loadImage();
renderAll();

</script>
</body>
</html>
