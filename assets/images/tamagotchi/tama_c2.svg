<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_c2" cx="42%" cy="38%" r="56%">
      <stop offset="0%" stop-color="#9aaa60"/>
      <stop offset="100%" stop-color="#607040"/>
    </radialGradient>
    <radialGradient id="body_c2" cx="40%" cy="36%" r="56%">
      <stop offset="0%" stop-color="#7a9448"/>
      <stop offset="100%" stop-color="#4e6428"/>
    </radialGradient>
  </defs>
  <!-- Thin struggling roots -->
  <path d="M51,149 Q48,156 44,162" stroke="#50381a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M58,151 Q57,158 56,164" stroke="#50381a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M66,151 Q67,158 68,164" stroke="#50381a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M69,149 Q72,156 76,162" stroke="#50381a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Body - smaller, yellow-green patches visible -->
  <ellipse cx="58" cy="118" rx="16" ry="26" fill="url(#body_c2)" stroke="#486028" stroke-width="1.2" transform="rotate(-4,58,118)"/>
  <!-- Yellow disease patches -->
  <ellipse cx="52" cy="108" rx="7" ry="5" fill="#c8c040" fill-opacity="0.5" transform="rotate(15,52,108)"/>
  <ellipse cx="66" cy="120" rx="6" ry="4" fill="#c8c040" fill-opacity="0.45" transform="rotate(-10,66,120)"/>
  <ellipse cx="56" cy="128" rx="5" ry="4" fill="#c0b838" fill-opacity="0.4"/>
  <!-- Arm leaves - wilting badly -->
  <path d="M44,112 Q26,112 26,97" stroke="#6a8830" stroke-width="8" fill="none" stroke-linecap="round" transform="rotate(15,44,112)"/>
  <path d="M72,112 Q90,112 90,97" stroke="#6a8830" stroke-width="8" fill="none" stroke-linecap="round" transform="rotate(-15,72,112)"/>
  <!-- Drooping leaf tips -->
  <path d="M26,97 Q20,102 22,108" stroke="#8a9a58" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M90,97 Q96,102 94,108" stroke="#8a9a58" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Head - smaller, sad -->
  <ellipse cx="58" cy="79" rx="22" ry="21" fill="url(#head_c2)" stroke="#4a6428" stroke-width="1.3" transform="rotate(-3,58,79)"/>
  <!-- Leaf hair - only 2 proper, 1 fallen -->
  <path d="M48,64 Q42,48 53,43 Q50,59 53,63Z" fill="#5a7030" stroke="#486028" stroke-width="1"/>
  <path d="M60,61 Q58,43 67,40 Q65,56 65,61Z" fill="#6a8038" stroke="#506830" stroke-width="1"/>
  <!-- Broken/bent leaf -->
  <path d="M70,66 Q78,60 76,48" stroke="#8a9858" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M76,48 Q76,42 80,44" stroke="#8a9858" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Fallen leaf on ground -->
  <ellipse cx="85" cy="148" rx="8" ry="4" fill="#9aaa60" fill-opacity="0.6" transform="rotate(-20,85,148)"/>
  <!-- Eyes - sad and tired -->
  <ellipse cx="49" cy="79" rx="8" ry="8.5" fill="white" stroke="#486028" stroke-width="0.8"/>
  <ellipse cx="67" cy="79" rx="8" ry="8.5" fill="white" stroke="#486028" stroke-width="0.8"/>
  <!-- Heavy droopy lids -->
  <path d="M41,76 Q49,72 57,76" stroke="#486028" stroke-width="4" fill="#9aaa60"/>
  <path d="M59,76 Q67,72 75,76" stroke="#486028" stroke-width="4" fill="#9aaa60"/>
  <circle cx="50" cy="80" r="5" fill="#1a2410"/>
  <circle cx="68" cy="80" r="5" fill="#1a2410"/>
  <circle cx="52" cy="78" r="1.8" fill="white"/>
  <circle cx="70" cy="78" r="1.8" fill="white"/>
  <!-- Sad mouth frown -->
  <path d="M52,93 Q58,89 64,93" stroke="#486028" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Multiple sweat/worry drops -->
  <ellipse cx="36" cy="74" rx="2.5" ry="4" fill="#c0d8f0" fill-opacity="0.7"/>
  <circle cx="36" cy="71" r="1.8" fill="#d0e4f8" fill-opacity="0.8"/>
  <ellipse cx="80" cy="72" rx="2" ry="3" fill="#c0d8f0" fill-opacity="0.6"/>
</svg>
