<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_a2" cx="40%" cy="33%" r="60%">
      <stop offset="0%" stop-color="#b0f060"/>
      <stop offset="100%" stop-color="#68a832"/>
    </radialGradient>
    <radialGradient id="glow_a2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d840" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#e8d840" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Growing glow -->
  <ellipse cx="60" cy="80" rx="55" ry="72" fill="url(#glow_a2)"/>
  <!-- Roots -->
  <path d="M47,150 Q41,158 34,164" stroke="#5a3c16" stroke-width="6.5" fill="none" stroke-linecap="round"/>
  <path d="M55,152 Q53,159 51,165" stroke="#5a3c16" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M65,152 Q67,159 69,165" stroke="#5a3c16" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M73,150 Q79,158 86,164" stroke="#5a3c16" stroke-width="6.5" fill="none" stroke-linecap="round"/>
  <!-- Body - taller, golden-tipped -->
  <ellipse cx="60" cy="110" rx="21" ry="33" fill="#82c040" stroke="#54902a" stroke-width="1.5"/>
  <!-- Gold tipping at leaf edges -->
  <path d="M48,88 Q44,82 48,78" stroke="#d4a020" stroke-width="1" fill="none"/>
  <path d="M72,88 Q76,82 72,78" stroke="#d4a020" stroke-width="1" fill="none"/>
  <!-- Arm leaves - wider, gold tips -->
  <path d="M39,106 Q15,90 23,68 Q35,96 43,104Z" fill="#68a832" stroke="#4e8025" stroke-width="1.2"/>
  <path d="M81,106 Q105,90 97,68 Q85,96 77,104Z" fill="#68a832" stroke="#4e8025" stroke-width="1.2"/>
  <!-- Gold leaf tips -->
  <path d="M23,68 Q20,63 24,61" stroke="#c89820" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M97,68 Q100,63 96,61" stroke="#c89820" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="60" cy="68" rx="30" ry="28" fill="url(#head_a2)" stroke="#54902a" stroke-width="1.5"/>
  <!-- Lush leaf hair -->
  <path d="M37,52 Q26,25 47,18 Q43,44 47,51Z" fill="#58902e" stroke="#406820" stroke-width="1.3"/>
  <path d="M49,45 Q44,16 62,9 Q57,36 58,44Z" fill="#68a838" stroke="#4e8028" stroke-width="1.3"/>
  <path d="M65,44 Q70,15 58,9 Q63,36 62,44Z" fill="#68a838" stroke="#4e8028" stroke-width="1.3"/>
  <path d="M74,48 Q86,22 68,16 Q72,42 70,48Z" fill="#58902e" stroke="#406820" stroke-width="1.3"/>
  <path d="M80,57 Q94,32 79,24 Q76,50 74,57Z" fill="#447820" stroke="#306015" stroke-width="1.3"/>
  <!-- MULTIPLE FLOWERS now - 3 -->
  <!-- Center flower -->
  <g transform="translate(60,5)">
    <circle cx="-4" cy="4" r="4" fill="#f8e030" stroke="#d0b818" stroke-width="1"/>
    <circle cx="4" cy="4" r="4" fill="#f8e030" stroke="#d0b818" stroke-width="1"/>
    <circle cx="0" cy="-1" r="4" fill="#f8e030" stroke="#d0b818" stroke-width="1"/>
    <circle cx="-3" cy="-3" r="4" fill="#fff0a0" stroke="#d0b818" stroke-width="1"/>
    <circle cx="3" cy="-3" r="4" fill="#fff0a0" stroke="#d0b818" stroke-width="1"/>
    <circle cx="0" cy="2" r="5.5" fill="#ffd820" stroke="#c0a010" stroke-width="1.2"/>
    <circle cx="0" cy="2" r="3" fill="#e05818"/>
  </g>
  <!-- Side flower left -->
  <g transform="translate(40,24)">
    <circle cx="-3" cy="2" r="3" fill="#f8e030" stroke="#d0b818" stroke-width="0.8"/>
    <circle cx="3" cy="2" r="3" fill="#f8e030" stroke="#d0b818" stroke-width="0.8"/>
    <circle cx="0" cy="-2" r="3" fill="#f8e030" stroke="#d0b818" stroke-width="0.8"/>
    <circle cx="0" cy="1" r="4" fill="#ffd820" stroke="#c0a010" stroke-width="1"/>
    <circle cx="0" cy="1" r="2" fill="#e05818"/>
  </g>
  <!-- Side flower right -->
  <g transform="translate(80,24)">
    <circle cx="-3" cy="2" r="3" fill="#f8e030" stroke="#d0b818" stroke-width="0.8"/>
    <circle cx="3" cy="2" r="3" fill="#f8e030" stroke="#d0b818" stroke-width="0.8"/>
    <circle cx="0" cy="-2" r="3" fill="#f8e030" stroke="#d0b818" stroke-width="0.8"/>
    <circle cx="0" cy="1" r="4" fill="#ffd820" stroke="#c0a010" stroke-width="1"/>
    <circle cx="0" cy="1" r="2" fill="#e05818"/>
  </g>
  <!-- Eyes - joyful -->
  <ellipse cx="46" cy="68" rx="10" ry="11" fill="white" stroke="#406820" stroke-width="1"/>
  <ellipse cx="74" cy="68" rx="10" ry="11" fill="white" stroke="#406820" stroke-width="1"/>
  <circle cx="47" cy="69" r="7" fill="#142210"/>
  <circle cx="75" cy="69" r="7" fill="#142210"/>
  <circle cx="50" cy="66" r="3" fill="white"/>
  <circle cx="78" cy="66" r="3" fill="white"/>
  <!-- Big smile -->
  <path d="M49,84 Q60,95 71,84" stroke="#406820" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <ellipse cx="35" cy="77" rx="6" ry="4" fill="#a0e040" fill-opacity="0.35"/>
  <ellipse cx="85" cy="77" rx="6" ry="4" fill="#a0e040" fill-opacity="0.35"/>
</svg>
