<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_c1" cx="42%" cy="38%" r="56%">
      <stop offset="0%" stop-color="#a8ba70"/>
      <stop offset="100%" stop-color="#708040"/>
    </radialGradient>
    <radialGradient id="body_c1" cx="40%" cy="35%" r="58%">
      <stop offset="0%" stop-color="#8aaa50"/>
      <stop offset="100%" stop-color="#587030"/>
    </radialGradient>
  </defs>
  <!-- Roots - thinner, struggling -->
  <path d="M50,148 Q46,155 42,161" stroke="#5a3c18" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M58,150 Q57,157 56,163" stroke="#5a3c18" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M66,150 Q67,157 68,163" stroke="#5a3c18" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M70,148 Q74,155 78,161" stroke="#5a3c18" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Body - pale, slightly drooping lean -->
  <ellipse cx="59" cy="116" rx="17" ry="27" fill="url(#body_c1)" stroke="#4a6828" stroke-width="1.2" transform="rotate(3,59,116)"/>
  <!-- Pale yellowing spots -->
  <circle cx="52" cy="106" r="4" fill="#d0c060" fill-opacity="0.4"/>
  <circle cx="66" cy="112" r="3.5" fill="#d0c060" fill-opacity="0.35"/>
  <!-- Arm leaves - drooping -->
  <path d="M43,110 Q24,105 28,88" stroke="#6a8830" stroke-width="9" fill="none" stroke-linecap="round" transform="rotate(8,43,110)"/>
  <path d="M75,110 Q94,105 90,88" stroke="#6a8830" stroke-width="9" fill="none" stroke-linecap="round" transform="rotate(-8,75,110)"/>
  <!-- Head - pale, smaller -->
  <ellipse cx="59" cy="77" rx="24" ry="22" fill="url(#head_c1)" stroke="#4e6c28" stroke-width="1.3" transform="rotate(2,59,77)"/>
  <!-- Leaf hair - only 3 leaves, one drooping -->
  <path d="M47,62 Q40,44 52,39 Q49,57 53,61Z" fill="#607838" stroke="#486028" stroke-width="1"/>
  <path d="M59,58 Q57,39 67,36 Q64,53 64,58Z" fill="#708840" stroke="#506830" stroke-width="1"/>
  <!-- One drooping wilted leaf -->
  <path d="M71,64 Q84,58 80,44 Q72,60 70,64Z" fill="#8a9a58" stroke="#607040" stroke-width="1" transform="rotate(15,71,64)"/>
  <!-- Eyes - tired, slightly droopy -->
  <ellipse cx="50" cy="77" rx="8.5" ry="9" fill="white" stroke="#4a6820" stroke-width="0.8"/>
  <ellipse cx="68" cy="77" rx="8.5" ry="9" fill="white" stroke="#4a6820" stroke-width="0.8"/>
  <!-- Droopy upper lids -->
  <path d="M41.5,74 Q50,71 58.5,74" stroke="#4a6820" stroke-width="3" fill="#a8ba70"/>
  <path d="M59.5,74 Q68,71 76.5,74" stroke="#4a6820" stroke-width="3" fill="#a8ba70"/>
  <circle cx="51" cy="78" r="5.5" fill="#1a2410"/>
  <circle cx="69" cy="78" r="5.5" fill="#1a2410"/>
  <circle cx="53" cy="76" r="2" fill="white"/>
  <circle cx="71" cy="76" r="2" fill="white"/>
  <!-- Tired downturned mouth -->
  <path d="M53,91 Q59,88 65,91" stroke="#4a6820" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Tired sweat drop -->
  <ellipse cx="38" cy="72" rx="3" ry="4.5" fill="#c8dcf0" fill-opacity="0.7"/>
  <circle cx="38" cy="69" r="2" fill="#d8e8f8" fill-opacity="0.8"/>
</svg>
