<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_b5" cx="40%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#508818"/>
      <stop offset="100%" stop-color="#244208"/>
    </radialGradient>
    <radialGradient id="body_b5" cx="35%" cy="24%" r="65%">
      <stop offset="0%" stop-color="#344e10"/>
      <stop offset="100%" stop-color="#162408"/>
    </radialGradient>
    <radialGradient id="earth_glow" cx="50%" cy="80%" r="50%">
      <stop offset="0%" stop-color="#604820" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#604820" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Earthen glow from roots -->
  <ellipse cx="60" cy="130" rx="58" ry="40" fill="url(#earth_glow)"/>
  <!-- Massive ancient roots spreading wide -->
  <path d="M44,153 Q34,164 24,172" stroke="#282008" stroke-width="10" fill="none" stroke-linecap="round"/>
  <path d="M52,155 Q49,165 46,174" stroke="#282008" stroke-width="7.5" fill="none" stroke-linecap="round"/>
  <path d="M68,155 Q71,165 74,174" stroke="#282008" stroke-width="7.5" fill="none" stroke-linecap="round"/>
  <path d="M76,153 Q86,164 96,172" stroke="#282008" stroke-width="10" fill="none" stroke-linecap="round"/>
  <!-- Far-spreading root network -->
  <path d="M24,172 Q12,178 6,174" stroke="#1c1806" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M24,172 Q16,182 20,188" stroke="#1c1806" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M96,172 Q108,178 114,174" stroke="#1c1806" stroke-width="5.5" fill="none" stroke-linecap="round"/>
  <path d="M96,172 Q104,182 100,188" stroke="#1c1806" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Body - tree trunk, very dark ancient bark -->
  <ellipse cx="60" cy="104" rx="25" ry="38" fill="url(#body_b5)" stroke="#1a2c08" stroke-width="3"/>
