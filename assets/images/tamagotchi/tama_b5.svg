    <ellipse cx="0" cy="-9" rx="6.5" ry="3" fill="#6a3e18" stroke="#4c2c10" stroke-width="0.8"/>
  </g>
  <g transform="translate(83,126)">
    <path d="M0,0 Q0,-8 0,-10" stroke="#3c2808" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="-10" rx="7" ry="3.2" fill="#6a3e18" stroke="#4c2c10" stroke-width="0.8"/>
  </g>
  <!-- TREE TRUNK ARM BRANCHES (not leaf arms anymore - true branches) -->
  <path d="M35,100 Q10,82 18,52" stroke="#2a2008" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M85,100 Q110,82 102,52" stroke="#2a2008" stroke-width="12" fill="none" stroke-linecap="round"/>
  <!-- Branch smaller splits -->
  <path d="M18,52 Q10,42 14,36" stroke="#2a2008" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M18,52 Q22,38 16,32" stroke="#2a2008" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M102,52 Q110,42 106,36" stroke="#2a2008" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M102,52 Q98,38 104,32" stroke="#2a2008" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Leaf tufts on branches -->
  <circle cx="14" cy="36" r="8" fill="#2a5010" fill-opacity="0.8"/>
  <circle cx="16" cy="32" r="7" fill="#2a5010" fill-opacity="0.8"/>
  <circle cx="106" cy="36" r="8" fill="#2a5010" fill-opacity="0.8"/>
  <circle cx="104" cy="32" r="7" fill="#2a5010" fill-opacity="0.8"/>
  <!-- Head - very dark, ancient guardian -->
  <ellipse cx="60" cy="62" rx="32" ry="30" fill="url(#head_b5)" stroke="#1e3806" stroke-width="2.5"/>
  <!-- Deep bark all over head -->
  <path d="M30,52 Q28,60 30,70" stroke="#142c04" stroke-width="2" fill="none" stroke-opacity="0.7"/>
  <path d="M90,52 Q92,60 90,70" stroke="#142c04" stroke-width="2" fill="none" stroke-opacity="0.7"/>
  <!-- Ancient leaf mane -->
  <path d="M30,44 Q16,10 46,2 Q38,34 42,43Z" fill="#244208" stroke="#162e06" stroke-width="1.6"/>
  <path d="M43,36 Q34,2 64,-8 Q55,28 57,36Z" fill="#305010" stroke="#203808" stroke-width="1.6"/>
  <path d="M66,35 Q76,1 59,-8 Q65,28 63,35Z" fill="#305010" stroke="#203808" stroke-width="1.6"/>
  <path d="M79,39 Q94,6 74,-2 Q78,34 76,40Z" fill="#244208" stroke="#162e06" stroke-width="1.6"/>
  <path d="M87,52 Q104,16 86,4 Q82,42 80,54Z" fill="#1a3406" stroke="#102404" stroke-width="1.6"/>
  <!-- THICK WHITE MOSSY EYEBROWS + beard hinting -->
  <path d="M32,52 Q46,47 54,52" stroke="#c0cca8" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M66,52 Q74,47 88,52" stroke="#c0cca8" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Moss on lower face as a beard/mane -->
  <path d="M36,85 Q60,96 84,85" stroke="#1a3406" stroke-width="8" fill="none" stroke-opacity="0.6" stroke-linecap="round"/>
  <circle cx="44" cy="90" r="5" fill="#1a3406" fill-opacity="0.65"/>
  <circle cx="60" cy="93" r="5.5" fill="#1a3406" fill-opacity="0.65"/>
  <circle cx="76" cy="90" r="5" fill="#1a3406" fill-opacity="0.65"/>
  <!-- Eyes - ancient, luminous green in darkness -->
  <ellipse cx="44" cy="62" rx="10.5" ry="11.5" fill="#102008" stroke="#1c3406" stroke-width="1.5"/>
  <ellipse cx="76" cy="62" rx="10.5" ry="11.5" fill="#102008" stroke="#1c3406" stroke-width="1.5"/>
  <!-- Glowing green irises - the mark of the Earth Guardian -->
  <circle cx="44" cy="62" r="7.5" fill="#286010" stroke="#40a020" stroke-width="1.5"/>
  <circle cx="76" cy="62" r="7.5" fill="#286010" stroke="#40a020" stroke-width="1.5"/>
  <circle cx="44" cy="62" r="4" fill="#60c830"/>
  <circle cx="76" cy="62" r="4" fill="#60c830"/>
  <circle cx="46" cy="59" r="2" fill="white" fill-opacity="0.9"/>
  <circle cx="78" cy="59" r="2" fill="white" fill-opacity="0.9"/>
  <!-- Serene guardian smile, partly hidden by moss beard -->
  <path d="M49,80 Q60,86 71,80" stroke="#1e3806" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
