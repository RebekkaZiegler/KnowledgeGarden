  <path d="M43,72 Q48,88 44,104" stroke="#141e04" stroke-width="2" fill="none" stroke-opacity="0.7"/>
  <path d="M76,74 Q72,90 75,106" stroke="#141e04" stroke-width="2" fill="none" stroke-opacity="0.7"/>
  <path d="M50,116 Q57,132 53,146" stroke="#141e04" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <path d="M68,118 Q63,134 66,148" stroke="#141e04" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <!-- Dense moss colonies -->
  <circle cx="42" cy="84" r="8.5" fill="#1a3804" fill-opacity="0.7"/>
  <circle cx="78" cy="80" r="8" fill="#1a3804" fill-opacity="0.65"/>
  <circle cx="43" cy="112" r="8" fill="#1a3804" fill-opacity="0.65"/>
  <circle cx="77" cy="120" r="7" fill="#1a3804" fill-opacity="0.65"/>
  <circle cx="60" cy="94" r="6" fill="#1a3804" fill-opacity="0.55"/>
