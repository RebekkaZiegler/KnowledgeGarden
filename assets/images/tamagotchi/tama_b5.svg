    <path d="M0,0 Q0,-10 0,-14" stroke="#3c2808" stroke-width="3" fill="none"/>
    <ellipse cx="0" cy="-14" rx="9" ry="4.5" fill="#7a4820" stroke="#4c2c10" stroke-width="1.2"/>
    <ellipse cx="0" cy="-12.5" rx="5" ry="2.5" fill="#a8684e"/>
    <circle cx="-4" cy="-15" r="2" fill="white" fill-opacity="0.45"/>
    <circle cx="3" cy="-16" r="1.5" fill="white" fill-opacity="0.45"/>
  </g>
  <g transform="translate(88,102)">
    <path d="M0,0 Q0,-9 0,-12" stroke="#3c2808" stroke-width="2.5" fill="none"/>
    <ellipse cx="0" cy="-12" rx="8" ry="4" fill="#7a4820" stroke="#4c2c10" stroke-width="1"/>
    <ellipse cx="0" cy="-11" rx="4.5" ry="2" fill="#a8684e"/>
    <circle cx="-3" cy="-13" r="1.8" fill="white" fill-opacity="0.45"/>
  </g>
  <g transform="translate(36,130)">
