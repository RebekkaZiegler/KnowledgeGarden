<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_b3" cx="40%" cy="33%" r="60%">
      <stop offset="0%" stop-color="#6aaa30"/>
      <stop offset="100%" stop-color="#386010"/>
    </radialGradient>
    <radialGradient id="body_b3" cx="37%" cy="28%" r="63%">
      <stop offset="0%" stop-color="#4e8020"/>
      <stop offset="100%" stop-color="#2c4c08"/>
    </radialGradient>
  </defs>
  <!-- Thick anchor roots -->
  <path d="M46,151 Q38,160 30,168" stroke="#3c2808" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M54,153 Q52,161 50,169" stroke="#3c2808" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M66,153 Q68,161 70,169" stroke="#3c2808" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M74,151 Q82,160 90,168" stroke="#3c2808" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Branch roots -->
  <path d="M30,168 Q22,172 18,170" stroke="#2c2006" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M90,168 Q98,172 102,170" stroke="#2c2006" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M30,168 Q25,175 28,178" stroke="#2c2006" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M90,168 Q95,175 92,178" stroke="#2c2006" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Body - dark forest green with bark texture -->
  <ellipse cx="60" cy="108" rx="22" ry="34" fill="url(#body_b3)" stroke="#28480a" stroke-width="2"/>
  <!-- Bark texture lines -->
  <path d="M48,84 Q52,96 50,108" stroke="#2a4808" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <path d="M68,86 Q65,98 67,110" stroke="#2a4808" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <path d="M55,120 Q60,130 58,140" stroke="#2a4808" stroke-width="1" fill="none" stroke-opacity="0.4"/>
  <!-- Heavy moss clusters -->
  <circle cx="46" cy="95" r="6" fill="#264606" fill-opacity="0.6"/>
  <circle cx="72" cy="90" r="5.5" fill="#264606" fill-opacity="0.55"/>
  <circle cx="50" cy="118" r="6" fill="#264606" fill-opacity="0.55"/>
  <circle cx="70" cy="124" r="5" fill="#264606" fill-opacity="0.5"/>
  <!-- Multiple mushrooms -->
  <g transform="translate(36,102)">
    <path d="M0,0 Q0,-6 0,-8" stroke="#5a3818" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="-8" rx="6" ry="3" fill="#9a6830" stroke="#6a4418" stroke-width="0.8"/>
    <ellipse cx="0" cy="-7" rx="3" ry="1.5" fill="#c49060"/>
  </g>
  <g transform="translate(84,98)">
    <path d="M0,0 Q0,-5 0,-7" stroke="#5a3818" stroke-width="2" fill="none"/>
    <ellipse cx="0" cy="-7" rx="5.5" ry="2.5" fill="#9a6830" stroke="#6a4418" stroke-width="0.8"/>
    <ellipse cx="0" cy="-6.5" rx="2.5" ry="1.2" fill="#c49060"/>
  </g>
  <!-- Arm leaves - very mossy and wide -->
  <path d="M38,104 Q14,90 22,65 Q34,94 42,102Z" fill="#406c18" stroke="#2c5008" stroke-width="1.3"/>
  <path d="M82,104 Q106,90 98,65 Q86,94 78,102Z" fill="#406c18" stroke="#2c5008" stroke-width="1.3"/>
  <!-- Heavy moss on arms -->
  <circle cx="23" cy="70" r="4" fill="#1e4006" fill-opacity="0.65"/>
  <circle cx="97" cy="70" r="4" fill="#1e4006" fill-opacity="0.65"/>
  <!-- Head - ancient look, darker -->
  <ellipse cx="60" cy="67" rx="30" ry="28" fill="url(#head_b3)" stroke="#306008" stroke-width="2"/>
  <!-- Bark cracks on face edges -->
  <path d="M32,58 Q30,64 32,72" stroke="#244008" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <path d="M88,58 Q90,64 88,72" stroke="#244008" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <!-- Mature thick leaf hair -->
  <path d="M34,50 Q22,22 46,14 Q40,40 44,49Z" fill="#346010" stroke="#204008" stroke-width="1.4"/>
  <path d="M47,43 Q40,14 62,6 Q55,34 56,43Z" fill="#406c18" stroke="#2c5010" stroke-width="1.4"/>
  <path d="M65,42 Q72,13 58,6 Q64,34 63,42Z" fill="#406c18" stroke="#2c5010" stroke-width="1.4"/>
  <path d="M76,46 Q88,18 70,12 Q74,40 72,47Z" fill="#346010" stroke="#204008" stroke-width="1.4"/>
  <path d="M83,56 Q97,28 80,18 Q77,46 75,57Z" fill="#285008" stroke="#183806" stroke-width="1.4"/>
  <!-- Moss heavy on hair -->
  <circle cx="45" cy="16" r="4" fill="#183806" fill-opacity="0.65"/>
  <circle cx="60" cy="7" r="4.5" fill="#183806" fill-opacity="0.6"/>
  <circle cx="79" cy="18" r="4" fill="#183806" fill-opacity="0.65"/>
  <!-- White moss/lichen flecks -->
  <circle cx="48" cy="22" r="1.5" fill="#d0d8c0" fill-opacity="0.7"/>
  <circle cx="72" cy="15" r="1.2" fill="#d0d8c0" fill-opacity="0.7"/>
  <!-- Eyes - deep wise old eyes, slight wrinkle -->
  <ellipse cx="46" cy="67" rx="10" ry="11" fill="#e8f0d8" stroke="#285008" stroke-width="1.2"/>
  <ellipse cx="74" cy="67" rx="10" ry="11" fill="#e8f0d8" stroke="#285008" stroke-width="1.2"/>
  <circle cx="47" cy="68" r="7" fill="#0c1806"/>
  <circle cx="75" cy="68" r="7" fill="#0c1806"/>
  <circle cx="50" cy="65" r="3" fill="white"/>
  <circle cx="78" cy="65" r="3" fill="white"/>
  <!-- Wisdom wrinkles above eyes -->
  <path d="M40,59 Q46,57 52,59" stroke="#285008" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M68,59 Q74,57 80,59" stroke="#285008" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <!-- Gentle steady expression -->
  <path d="M50,83 Q60,89 70,83" stroke="#285008" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
