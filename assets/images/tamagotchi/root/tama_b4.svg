  <path d="M66,38 Q74,7 59,0 Q65,32 63,38Z" fill="#386018" stroke="#284810" stroke-width="1.5"/>
  <path d="M77,42 Q91,12 72,4 Q76,36 74,43Z" fill="#2c5010" stroke="#1c3c08" stroke-width="1.5"/>
  <path d="M85,54 Q100,22 82,12 Q79,44 77,55Z" fill="#204008" stroke="#142e06" stroke-width="1.5"/>
