    </radialGradient>
  </defs>
  <!-- Ancient thick roots -->
  <path d="M45,152 Q36,162 28,170" stroke="#302008" stroke-width="9" fill="none" stroke-linecap="round"/>
  <path d="M53,154 Q51,163 48,171" stroke="#302008" stroke-width="7" fill="none" stroke-linecap="round"/>
