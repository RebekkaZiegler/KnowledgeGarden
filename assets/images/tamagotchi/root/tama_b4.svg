  <path d="M35,61 Q45,56 55,61" stroke="#224006" stroke-width="3.5" fill="#346010"/>
  <path d="M65,61 Q75,56 85,61" stroke="#224006" stroke-width="3.5" fill="#346010"/>
  <circle cx="46" cy="67" r="7" fill="#0a1404"/>
  <circle cx="76" cy="67" r="7" fill="#0a1404"/>
  <circle cx="49" cy="64" r="3" fill="white"/>
  <circle cx="79" cy="64" r="3" fill="white"/>
  <!-- Deep wise expression -->
  <path d="M50,82 Q60,87 70,82" stroke="#224006" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lichen on face -->
  <circle cx="34" cy="75" r="2" fill="#c0c8a8" fill-opacity="0.6"/>
  <circle cx="86" cy="75" r="2" fill="#c0c8a8" fill-opacity="0.6"/>
