      <stop offset="0%" stop-color="#5c9828"/>
      <stop offset="100%" stop-color="#2e5008"/>
    </radialGradient>
    <radialGradient id="body_b4" cx="36%" cy="26%" r="64%">
      <stop offset="0%" stop-color="#406818"/>
