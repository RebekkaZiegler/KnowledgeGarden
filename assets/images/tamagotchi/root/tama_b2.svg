  <path d="M79,58 Q92,34 77,26 Q74,50 73,58Z" fill="#305c10" stroke="#204008" stroke-width="1.3"/>
  <!-- Moss on hair -->
  <circle cx="46" cy="23" r="3" fill="#284808" fill-opacity="0.6"/>
  <circle cx="60" cy="14" r="3.5" fill="#284808" fill-opacity="0.55"/>
