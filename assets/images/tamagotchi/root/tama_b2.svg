  <path d="M41,62 Q47,60 53,62" stroke="#306010" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M67,62 Q73,60 79,62" stroke="#306010" stroke-width="1.5" fill="none" stroke-linecap="round"/>
