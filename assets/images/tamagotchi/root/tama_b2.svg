<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_b2" cx="40%" cy="33%" r="60%">
      <stop offset="0%" stop-color="#78b838"/>
      <stop offset="100%" stop-color="#426c18"/>
    </radialGradient>
    <radialGradient id="body_b2" cx="38%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#589028"/>
