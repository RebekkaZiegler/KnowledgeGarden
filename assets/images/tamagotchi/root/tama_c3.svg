<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_c3" cx="44%" cy="40%" r="54%">
      <stop offset="0%" stop-color="#8a9a58"/>
      <stop offset="100%" stop-color="#4e6030"/>
    </radialGradient>
    <radialGradient id="body_c3" cx="42%" cy="37%" r="55%">
      <stop offset="0%" stop-color="#6a8040"/>
      <stop offset="100%" stop-color="#404e20"/>
    </radialGradient>
  </defs>
  <!-- Gnarled thin roots -->
  <path d="M52,150 Q50,156 46,162" stroke="#4a3415" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M59,152 Q58,159 57,165" stroke="#4a3415" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M65,152 Q66,159 67,165" stroke="#4a3415" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M68,150 Q70,156 74,162" stroke="#4a3415" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Body - gnarled, darker, thorns appearing -->
  <ellipse cx="60" cy="118" rx="15" ry="26" fill="url(#body_c3)" stroke="#3e5020" stroke-width="1.3" transform="rotate(-5,60,118)"/>
  <!-- Thorns on body -->
  <path d="M46,100 L40,95 L46,96" fill="#3a4818" stroke="#2a3810" stroke-width="0.5"/>
  <path d="M46,112 L39,108 L46,110" fill="#3a4818" stroke="#2a3810" stroke-width="0.5"/>
  <path d="M74,104 L80,99 L74,100" fill="#3a4818" stroke="#2a3810" stroke-width="0.5"/>
  <path d="M74,118 L81,114 L74,116" fill="#3a4818" stroke="#2a3810" stroke-width="0.5"/>
  <!-- Dark splotches -->
  <ellipse cx="52" cy="108" rx="8" ry="6" fill="#383820" fill-opacity="0.6"/>
  <ellipse cx="67" cy="122" rx="7" ry="5" fill="#383820" fill-opacity="0.55"/>
  <!-- Arm leaves - barely there, gnarled -->
  <path d="M46,110 Q32,116 26,104" stroke="#5a7028" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M74,110 Q88,116 94,104" stroke="#5a7028" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Dead tips on arms -->
  <circle cx="26" cy="104" r="5" fill="#4a4a28" fill-opacity="0.7"/>
  <circle cx="94" cy="104" r="5" fill="#4a4a28" fill-opacity="0.7"/>
  <!-- Head - darker, sadder, off-center -->
  <ellipse cx="59" cy="80" rx="21" ry="20" fill="url(#head_c3)" stroke="#3e5020" stroke-width="1.5" transform="rotate(-6,59,80)"/>
  <!-- Only 2 sad leaves, one falling -->
  <path d="M50,65 Q46,50 55,46 Q53,61 54,65Z" fill="#546430" stroke="#3e5020" stroke-width="1"/>
  <!-- Very drooping, bent leaf -->
  <path d="M63,63 Q72,56 70,44" stroke="#6a7a38" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M70,44 Q75,37 72,32 Q68,38 70,42" stroke="#6a7a38" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- More fallen leaves on ground -->
  <ellipse cx="82" cy="148" rx="9" ry="4" fill="#8a9a58" fill-opacity="0.55" transform="rotate(-25,82,148)"/>
  <ellipse cx="30" cy="152" rx="7" ry="3.5" fill="#8a9a58" fill-opacity="0.5" transform="rotate(15,30,152)"/>
  <!-- Eyes - sad, slightly angry/worried mix -->
  <ellipse cx="49" cy="80" rx="8" ry="8.5" fill="#f0f0e0" stroke="#3e5020" stroke-width="0.8"/>
  <ellipse cx="68" cy="79" rx="8" ry="8.5" fill="#f0f0e0" stroke="#3e5020" stroke-width="0.8"/>
  <!-- Angry brow on one side -->
  <path d="M42,73 Q49,69 55,72" stroke="#3e5020" stroke-width="2.5" fill="none" stroke-linecap="round" transform="rotate(-5,49,70)"/>
  <path d="M62,71 Q69,68 76,72" stroke="#3e5020" stroke-width="2.5" fill="none" stroke-linecap="round" transform="rotate(5,69,69)"/>
  <!-- Heavy lid droop -->
  <path d="M41,77 Q49,74 57,77" stroke="#3e5020" stroke-width="3.5" fill="#8a9a58"/>
  <path d="M60,77 Q68,74 76,76" stroke="#3e5020" stroke-width="3.5" fill="#8a9a58"/>
  <circle cx="50" cy="81" r="5" fill="#181e0c"/>
  <circle cx="69" cy="80" r="5" fill="#181e0c"/>
  <circle cx="52" cy="79" r="1.8" fill="white"/>
  <circle cx="71" cy="78" r="1.8" fill="white"/>
  <!-- Sad frown -->
  <path d="M52,94 Q59,90 66,94" stroke="#3e5020" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Visible lines of stress on face -->
  <path d="M43,87 Q41,91 43,93" stroke="#3e5020" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <path d="M76,86 Q78,90 76,92" stroke="#3e5020" stroke-width="1" fill="none" stroke-opacity="0.5"/>
</svg>
