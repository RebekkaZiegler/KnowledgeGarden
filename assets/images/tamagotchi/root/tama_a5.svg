<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_a5" cx="40%" cy="30%" r="62%">
      <stop offset="0%" stop-color="#f0ffb0"/>
      <stop offset="100%" stop-color="#90d050"/>
    </radialGradient>
    <radialGradient id="divine_aura" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#fff8a0" stop-opacity="0.75"/>
