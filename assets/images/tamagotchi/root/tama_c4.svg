<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160">
  <defs>
    <radialGradient id="head_c4" cx="44%" cy="40%" r="54%">
      <stop offset="0%" stop-color="#6a7848"/>
      <stop offset="100%" stop-color="#363e20"/>
    </radialGradient>
    <radialGradient id="body_c4" cx="42%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#4e5e30"/>
      <stop offset="100%" stop-color="#2a3010"/>
    </radialGradient>
    <radialGradient id="shadow_c4" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#200820" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#200820" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark shadow aura -->
  <ellipse cx="60" cy="100" rx="52" ry="65" fill="url(#shadow_c4)"/>
  <!-- Shadow wisps -->
  <path d="M30,90 Q22,80 18,84" stroke="#280830" stroke-width="3" fill="none" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M90,90 Q98,80 102,84" stroke="#280830" stroke-width="3" fill="none" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M25,110 Q15,100 12,106" stroke="#280830" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
  <path d="M95,110 Q105,100 108,106" stroke="#280830" stroke-width="2.5" fill="none" stroke-opacity="0.5"/>
  <!-- Very thin gnarled roots -->
  <path d="M54,150 Q52,156 50,162" stroke="#3a2810" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M60,152 Q60,158 60,164" stroke="#3a2810" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M66,150 Q68,156 70,162" stroke="#3a2810" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Body - small, dark, thorny -->
  <ellipse cx="60" cy="120" rx="14" ry="25" fill="url(#body_c4)" stroke="#303818" stroke-width="1.5"/>
  <!-- Many thorns -->
  <path d="M47,104 L39,98 L47,101" fill="#2a2c10" stroke="#1e2008" stroke-width="0.5"/>
  <path d="M47,114 L38,110 L47,112" fill="#2a2c10" stroke="#1e2008" stroke-width="0.5"/>
  <path d="M47,124 L38,121 L47,123" fill="#2a2c10" stroke="#1e2008" stroke-width="0.5"/>
  <path d="M73,108 L81,102 L73,105" fill="#2a2c10" stroke="#1e2008" stroke-width="0.5"/>
  <path d="M73,120 L82,116 L73,118" fill="#2a2c10" stroke="#1e2008" stroke-width="0.5"/>
  <path d="M73,130 L81,127 L73,129" fill="#2a2c10" stroke="#1e2008" stroke-width="0.5"/>
  <!-- Dark patches everywhere -->
  <ellipse cx="54" cy="110" rx="7" ry="5.5" fill="#1c1e0a" fill-opacity="0.7"/>
  <ellipse cx="66" cy="124" rx="6.5" ry="5" fill="#1c1e0a" fill-opacity="0.65"/>
  <!-- Arm leaves - shadow tentacle-like -->
  <path d="M47,112 Q32,120 24,110 Q26,100 34,104Z" fill="#3a4820" stroke="#282e10" stroke-width="1"/>
  <path d="M73,112 Q88,120 96,110 Q94,100 86,104Z" fill="#3a4820" stroke="#282e10" stroke-width="1"/>
  <!-- Thorn tips on arms -->
  <path d="M24,110 L16,106 L22,112" fill="#1e2008" stroke="#14180a" stroke-width="0.5"/>
  <path d="M96,110 L104,106 L98,112" fill="#1e2008" stroke="#14180a" stroke-width="0.5"/>
  <!-- Shadow tendrils rising from arms -->
  <path d="M28,108 Q20,96 24,88" stroke="#300830" stroke-width="2" fill="none" stroke-opacity="0.5"/>
  <path d="M92,108 Q100,96 96,88" stroke="#300830" stroke-width="2" fill="none" stroke-opacity="0.5"/>
  <!-- Head - dark, small, shadowy -->
  <ellipse cx="60" cy="83" rx="20" ry="19" fill="url(#head_c4)" stroke="#303818" stroke-width="1.5"/>
  <!-- Only 1 dead leaf on top -->
  <path d="M55,67 Q52,53 60,50 Q59,64 59,67Z" fill="#4a5028" stroke="#363c18" stroke-width="1" transform="rotate(-15,55,67)"/>
  <!-- Shadow tendrils replacing hair -->
  <path d="M52,66 Q44,54 48,44" stroke="#300830" stroke-width="3" fill="none" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M60,64 Q62,50 58,40" stroke="#300830" stroke-width="2.5" fill="none" stroke-opacity="0.6" stroke-linecap="round"/>
  <path d="M68,66 Q76,54 72,44" stroke="#300830" stroke-width="3" fill="none" stroke-opacity="0.65" stroke-linecap="round"/>
  <!-- Fallen leaves decomposing -->
  <ellipse cx="25" cy="152" rx="8" ry="3.5" fill="#606840" fill-opacity="0.5" transform="rotate(20,25,152)"/>
  <ellipse cx="88" cy="149" rx="7" ry="3" fill="#606840" fill-opacity="0.45" transform="rotate(-15,88,149)"/>
  <ellipse cx="96" cy="155" rx="6" ry="2.5" fill="#484e28" fill-opacity="0.5" transform="rotate(10,96,155)"/>
  <!-- GLOWING RED-ORANGE EYES - the mark of shadow path -->
  <ellipse cx="51" cy="83" rx="8.5" ry="9" fill="#0a0a08" stroke="#602020" stroke-width="1.2"/>
  <ellipse cx="69" cy="83" rx="8.5" ry="9" fill="#0a0a08" stroke="#602020" stroke-width="1.2"/>
  <circle cx="51" cy="83" r="5.5" fill="#6a1808"/>
  <circle cx="69" cy="83" r="5.5" fill="#6a1808"/>
  <circle cx="51" cy="83" r="3" fill="#c83010"/>
  <circle cx="69" cy="83" r="3" fill="#c83010"/>
  <!-- Eerie glow in eyes -->
  <circle cx="53" cy="81" r="1.5" fill="#ff9060" fill-opacity="0.8"/>
  <circle cx="71" cy="81" r="1.5" fill="#ff9060" fill-opacity="0.8"/>
  <!-- Grim expression -->
  <path d="M53,97 Q60,94 67,97" stroke="#302018" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Stress lines all over face -->
  <path d="M40,76 Q38,80 40,84" stroke="#2a2e14" stroke-width="1.2" fill="none" stroke-opacity="0.6"/>
  <path d="M80,76 Q82,80 80,84" stroke="#2a2e14" stroke-width="1.2" fill="none" stroke-opacity="0.6"/>
  <path d="M46,91 Q44,95 46,97" stroke="#2a2e14" stroke-width="1" fill="none" stroke-opacity="0.5"/>
  <path d="M74,91 Q76,95 74,97" stroke="#2a2e14" stroke-width="1" fill="none" stroke-opacity="0.5"/>
</svg>
