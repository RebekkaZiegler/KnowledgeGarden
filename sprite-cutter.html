<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Sprite Cutter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

    #topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: #16213e;
      border-bottom: 1px solid #0f3460; flex-shrink: 0;
    }
    #topbar h1 { font-size: 0.9rem; font-weight: 700; color: #e94560; margin-right: 6px; }
    #topbar input[type="text"] {
      background: #0f3460; border: 1px solid #555; color: #fff;
      padding: 4px 8px; border-radius: 4px; font-size: 0.78rem; width: 200px;
    }
    button {
      background: #e94560; color: #fff; border: none;
      padding: 5px 12px; border-radius: 4px; cursor: pointer;
      font-size: 0.78rem; font-weight: 600;
    }
    button:hover { background: #c73652; }
    button.sec { background: #0f3460; border: 1px solid #555; }
    button.sec:hover { background: #1a4a80; }

    #main { display: flex; flex: 1; overflow: hidden; }

    #canvas-wrap {
      flex: 1; overflow: auto; background: #111;
      position: relative; cursor: crosshair;
    }
    #canvas { display: block; }

    #sidebar {
      width: 220px; background: #16213e;
      border-left: 1px solid #0f3460;
      display: flex; flex-direction: column;
      padding: 12px; gap: 10px; overflow-y: auto;
    }
    #sidebar h2 { font-size: 0.8rem; color: #e94560; }
    #sidebar label { font-size: 0.7rem; color: #999; display: block; margin-bottom: 3px; }
    #sidebar input[type="text"] {
      width: 100%; background: #0d0d1a; border: 1px solid #333;
      color: #e0e0e0; padding: 4px 7px; border-radius: 4px; font-size: 0.78rem;
    }
    #sidebar input:focus { outline: none; border-color: #e94560; }
    #info { font-size: 0.68rem; color: #666; line-height: 1.5; }
    #selection-info { font-size: 0.72rem; color: #c77dff; }

    #saved-list { display: flex; flex-direction: column; gap: 4px; }
    .saved-item {
      font-size: 0.65rem; color: #aaa; background: #0d0d1a;
      padding: 3px 6px; border-radius: 3px;
      display: flex; align-items: center; gap: 6px;
    }
    .saved-dot { width: 6px; height: 6px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="topbar">
  <h1>✂ Sprite Cutter</h1>
  <button class="sec" onclick="pickFile()">📁 Bild öffnen</button>
  <input type="text" id="file-path" placeholder="oder Pfad eingeben..." />
  <button class="sec" onclick="loadFromPath()">Laden</button>
  <button onclick="autoDetect()" id="auto-btn" style="background:#c77dff" disabled>✨ Auto-erkennen</button>
  <span id="auto-status" style="font-size:0.72rem;color:#c77dff"></span>
</div>

<input type="file" id="file-input" accept="image/*" style="display:none" />

<div id="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="sidebar">
    <h2>Ausschneiden</h2>
    <div id="info">
      Ziehe ein Rechteck über das gewünschte Element.<br><br>
      Dann Namen eingeben und speichern.
    </div>
    <div id="selection-info">Keine Auswahl</div>

    <div>
      <label>Dateiname</label>
      <input type="text" id="filename" placeholder="z.B. stuhl_dreckig" />
    </div>

    <button onclick="saveSelection()">💾 Ausschnitt speichern</button>

    <div style="border-top:1px solid #0f3460; padding-top:8px;">
      <div style="font-size:0.7rem;color:#999;margin-bottom:6px;">Gespeichert:</div>
      <div id="saved-list"></div>
    </div>

    <div style="border-top:1px solid #0f3460; padding-top:8px; font-size:0.65rem; color:#555; line-height:1.6;">
      Tipp: Halte Shift gedrückt um quadratisch zu schneiden.<br>
      Gespeicherte Dateien landen im Download-Ordner.
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let img = null;
let selection = null; // {x, y, w, h} in image coords
let dragging = false;
let startX, startY;
let scale = 1;
let savedCount = 0;
let detectedBoxes = []; // auto-detected bounding boxes
let hoveredBox = null;

// ── Load image ─────────────────────────────────────────────
function pickFile() {
  document.getElementById("file-input").onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    document.getElementById("file-path").value = file.name;
    const url = URL.createObjectURL(file);
    loadImg(url);
  };
  document.getElementById("file-input").click();
}

function loadFromPath() {
  const path = document.getElementById("file-path").value.trim();
  if (path) loadImg(path);
}

function loadImg(src) {
  const image = new Image();
  image.onload = () => {
    img = image;
    // scale to fit canvas-wrap width
    const wrap = document.getElementById("canvas-wrap");
    scale = Math.min(1, (wrap.clientWidth - 20) / img.naturalWidth);
    canvas.width  = Math.round(img.naturalWidth  * scale);
    canvas.height = Math.round(img.naturalHeight * scale);
    selection = null;
    detectedBoxes = [];
    document.getElementById("auto-btn").disabled = false;
    draw();
  };
  image.onerror = () => alert("Bild konnte nicht geladen werden: " + src);
  image.src = src;
}

// ── Auto-detect ────────────────────────────────────────────
function autoDetect() {
  if (!img) return;
  document.getElementById("auto-status").textContent = "Analysiere...";

  // draw image to offscreen canvas at full res to read pixels
  const off = document.createElement("canvas");
  off.width = img.naturalWidth; off.height = img.naturalHeight;
  const oc = off.getContext("2d");
  oc.drawImage(img, 0, 0);
  const data = oc.getImageData(0, 0, off.width, off.height).data;

  const W = off.width, H = off.height;

  // is a pixel "background"? (transparent or near-white or very light)
  function isBg(i) {
    const a = data[i+3];
    if (a < 30) return true; // transparent
    const r = data[i], g = data[i+1], b = data[i+2];
    return r > 235 && g > 235 && b > 235; // near white
  }

  // build content mask
  const mask = new Uint8Array(W * H);
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    mask[y * W + x] = isBg((y * W + x) * 4) ? 0 : 1;
  }

  // project onto axes
  const colSum = new Int32Array(W);
  const rowSum = new Int32Array(H);
  for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
    if (mask[y * W + x]) { colSum[x]++; rowSum[y]++; }
  }

  const GAP = 8; // min gap in pixels between items

  function findRanges(sums, len) {
    const ranges = [];
    let inRange = false, start = 0;
    for (let i = 0; i < len; i++) {
      if (!inRange && sums[i] > 0) { inRange = true; start = i; }
      else if (inRange && sums[i] === 0) {
        // check if gap is big enough
        let gapEnd = i;
        while (gapEnd < len && sums[gapEnd] === 0) gapEnd++;
        if (gapEnd - i >= GAP || gapEnd === len) {
          ranges.push([start, i - 1]);
          inRange = false;
          i = gapEnd - 1;
        }
      }
    }
    if (inRange) ranges.push([start, len - 1]);
    return ranges;
  }

  const rowRanges = findRanges(rowSum, H);
  const pad = 4;
  detectedBoxes = [];

  rowRanges.forEach(([ry0, ry1]) => {
    // for each row band, find column ranges within that band
    const bandColSum = new Int32Array(W);
    for (let y = ry0; y <= ry1; y++) for (let x = 0; x < W; x++) {
      if (mask[y * W + x]) bandColSum[x]++;
    }
    const colRanges = findRanges(bandColSum, W);
    colRanges.forEach(([cx0, cx1]) => {
      // tighten to actual content
      let minY = ry1, maxY = ry0;
      for (let y = ry0; y <= ry1; y++) for (let x = cx0; x <= cx1; x++) {
        if (mask[y * W + x]) { minY = Math.min(minY, y); maxY = Math.max(maxY, y); }
      }
      const box = {
        x: Math.max(0, cx0 - pad),
        y: Math.max(0, minY - pad),
        w: Math.min(W, cx1 - cx0 + pad * 2),
        h: Math.min(H, maxY - minY + pad * 2),
        label: `item_${detectedBoxes.length + 1}`
      };
      if (box.w > 10 && box.h > 10) detectedBoxes.push(box);
    });
  });

  document.getElementById("auto-status").textContent = `${detectedBoxes.length} Items gefunden — klicken zum Auswählen`;
  draw();
}

// ── Draw ───────────────────────────────────────────────────
function draw() {
  if (!img) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  // draw detected boxes
  detectedBoxes.forEach((box, i) => {
    const x = box.x * scale, y = box.y * scale;
    const w = box.w * scale, h = box.h * scale;
    const isHovered = hoveredBox === i;
    ctx.strokeStyle = isHovered ? "#fff" : "#c77dff";
    ctx.lineWidth = isHovered ? 2.5 : 1.5;
    ctx.setLineDash([5, 3]);
    ctx.strokeRect(x, y, w, h);
    ctx.setLineDash([]);
    // number label
    ctx.fillStyle = isHovered ? "#fff" : "#c77dff";
    ctx.font = `bold ${Math.max(10, 13 * scale)}px system-ui`;
    ctx.fillText(i + 1, x + 4, y + 14 * scale);
  });

  if (selection) {
    const { x, y, w, h } = selectionToCanvas();
    ctx.fillStyle = "rgba(0,0,0,0.45)";
    ctx.fillRect(0, 0, canvas.width, y);
    ctx.fillRect(0, y + h, canvas.width, canvas.height - y - h);
    ctx.fillRect(0, y, x, h);
    ctx.fillRect(x + w, y, canvas.width - x - w, h);
    ctx.strokeStyle = "#e94560";
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.strokeRect(x, y, w, h);
    const cs = 8;
    ctx.fillStyle = "#e94560";
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy]) => {
      ctx.fillRect(cx - cs/2, cy - cs/2, cs, cs);
    });
  }
}

function selectionToCanvas() {
  const { x, y, w, h } = selection;
  return { x: x * scale, y: y * scale, w: w * scale, h: h * scale };
}

// ── Mouse ──────────────────────────────────────────────────
function getBoxAt(ex, ey) {
  for (let i = detectedBoxes.length - 1; i >= 0; i--) {
    const b = detectedBoxes[i];
    if (ex >= b.x && ex <= b.x + b.w && ey >= b.y && ey <= b.y + b.h) return i;
  }
  return -1;
}

canvas.addEventListener("mousemove", e => {
  if (dragging) return; // handled below
  if (!img || !detectedBoxes.length) return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) / scale;
  const my = (e.clientY - r.top)  / scale;
  const prev = hoveredBox;
  hoveredBox = getBoxAt(mx, my);
  if (hoveredBox >= 0) canvas.style.cursor = "pointer";
  else canvas.style.cursor = "crosshair";
  if (hoveredBox !== prev) draw();
});

canvas.addEventListener("mousedown", e => {
  if (!img) return;
  const r = canvas.getBoundingClientRect();
  const mx = (e.clientX - r.left) / scale;
  const my = (e.clientY - r.top)  / scale;
  // click on detected box → select it
  const bi = getBoxAt(mx, my);
  if (bi >= 0) {
    const b = detectedBoxes[bi];
    selection = { x: b.x, y: b.y, w: b.w, h: b.h };
    document.getElementById("filename").value = b.label;
    document.getElementById("selection-info").textContent =
      `Box ${bi+1}: ${Math.round(b.w)} × ${Math.round(b.h)} px`;
    draw();
    return;
  }
  dragging = true;
  startX = mx; startY = my;
  selection = { x: startX, y: startY, w: 0, h: 0 };
});

canvas.addEventListener("mousemove", e => {
  if (!dragging || !img || detectedBoxes.length) return;
  const r = canvas.getBoundingClientRect();
  let ex = (e.clientX - r.left) / scale;
  let ey = (e.clientY - r.top)  / scale;
  let w = ex - startX;
  let h = ey - startY;
  if (e.shiftKey) { const s = Math.max(Math.abs(w), Math.abs(h)); w = Math.sign(w)*s; h = Math.sign(h)*s; }
  selection = {
    x: Math.max(0, w < 0 ? startX + w : startX),
    y: Math.max(0, h < 0 ? startY + h : startY),
    w: Math.min(Math.abs(w), img.naturalWidth),
    h: Math.min(Math.abs(h), img.naturalHeight)
  };
  draw();
  document.getElementById("selection-info").textContent =
    `${Math.round(selection.x)}, ${Math.round(selection.y)} — ${Math.round(selection.w)} × ${Math.round(selection.h)} px`;
});

canvas.addEventListener("mouseup", () => { dragging = false; });
canvas.addEventListener("mouseleave", () => { if (dragging) dragging = false; });

// ── Save ───────────────────────────────────────────────────
function saveSelection() {
  if (!img || !selection || selection.w < 2 || selection.h < 2) {
    alert("Zuerst einen Bereich auswählen!"); return;
  }
  const name = document.getElementById("filename").value.trim() || `sprite_${++savedCount}`;
  const tmp = document.createElement("canvas");
  const { x, y, w, h } = selection;
  tmp.width = Math.round(w);
  tmp.height = Math.round(h);
  const tc = tmp.getContext("2d");
  tc.drawImage(img, x, y, w, h, 0, 0, tmp.width, tmp.height);
  tmp.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name.endsWith(".png") ? name : name + ".png";
    a.click();
    // add to list
    const list = document.getElementById("saved-list");
    const item = document.createElement("div");
    item.className = "saved-item";
    item.innerHTML = `<div class="saved-dot"></div>${a.download}`;
    list.prepend(item);
    document.getElementById("filename").value = "";
    selection = null;
    draw();
    document.getElementById("selection-info").textContent = "Keine Auswahl";
  }, "image/png");
}

// keyboard: Escape clears selection, Enter saves
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { selection = null; draw(); document.getElementById("selection-info").textContent = "Keine Auswahl"; }
  if (e.key === "Enter") saveSelection();
});
</script>
</body>
</html>
